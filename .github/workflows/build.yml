name: Build MmsConfigFix
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign and Align APK
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
          jarsigner -sigalg SHA256withRSA -digestalg SHA-256 -keystore debug.keystore -sto
