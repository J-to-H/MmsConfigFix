name: Build MmsConfigFix
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip -O gradle-8.0-bin.zip
          unzip -q gradle-8.0-bin.zip
          gradle-8.0/bin/gradle wrapper --gradle-version 8.0
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MmsConfigFix
          path: app/build/outputs/apk/release/app-release-unsigned.apk
